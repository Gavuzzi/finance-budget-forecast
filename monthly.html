<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almgren Industrier — Monthly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="app-main">
      <header class="page-head">
        <h1>Monthly</h1>
        <p class="page-sub">Month-by-month P&amp;L — actual + forecast</p>
      </header>

      <section class="lens-controls">
        <div class="lens-toggle" role="tablist">
          <button class="lens-btn active" data-lens="fy" type="button">This Fiscal Year</button>
          <button class="lens-btn" data-lens="rolling" type="button">Rolling 12 Months</button>
        </div>
      </section>

      <p class="table-hint">Figures in mkr. <span class="mt-legend-actual">Solid</span> columns are booked actuals; <span class="mt-legend-forecast">lighter</span> columns are forecast. The accent line marks where actuals end.</p>

      <section class="panel">
        <div class="monthly-wrap">
          <div id="monthlyGrid"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lib.js"></script>
  <script src="data.js"></script>
  <script src="sidebar.js"></script>
  <script src="monthly.js"></script>
  <script>requireAuthAndLoad(() => { renderSidebar(); window.initPage(); });</script>
</body>
</html>
