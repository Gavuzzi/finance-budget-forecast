<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly — FP&A</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="app-main">
      <header class="page-head">
        <div class="page-head-text">
          <h1 data-i18n="monthly_h1">Monthly</h1>
          <p class="page-sub" data-i18n-html="monthly_subtitle">Month-by-month P&amp;L — actual + forecast</p>
        </div>
      </header>

      <section class="lens-controls">
        <div class="lens-toggle" role="tablist">
          <button class="lens-btn active" data-lens="fy" type="button" data-i18n="lens_fy">This Fiscal Year</button>
          <button class="lens-btn" data-lens="rolling" type="button" data-i18n="lens_rolling">Rolling 12 Months</button>
        </div>
        <label class="smooth-toggle" data-i18n-title="smooth_hint" title="Period average, for trend reading — doesn't change totals">
          <input type="checkbox" id="smoothToggle">
          <span data-i18n="smooth_toggle">Spread lumpy actuals</span>
        </label>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 data-i18n="monthly_grid_h2">Month by month</h2>
          <div class="panel-actions">
            <button class="btn-secondary" id="exportBtn" type="button" data-i18n="export_excel_btn">⬇ Export (Excel)</button>
          </div>
        </div>
        <p class="panel-legend" data-i18n-html="monthly_figures_hint">Figures in <span id="unitLabel">mkr</span>. <span class="mt-legend-actual">Solid</span> = booked actuals, <span class="mt-legend-forecast">lighter</span> = forecast.</p>
        <div class="monthly-wrap">
          <div id="monthlyGrid"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lib.js"></script>
  <script src="i18n.js"></script>
  <script src="data.js"></script>
  <script src="sidebar.js"></script>
  <script src="fortnox.js"></script>
  <script src="monthly.js"></script>
  <script>requireAuthAndLoad(() => { renderSidebar(); window.initPage(); });</script>
</body>
</html>
