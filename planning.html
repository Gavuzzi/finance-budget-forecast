<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning — FP&A</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="app-main">
      <header class="page-head">
        <div class="page-head-text">
          <h1>Planning</h1>
          <p class="page-sub">The headcount and cost drivers behind each reporting line</p>
        </div>
      </header>

      <p class="planning-intro">Headcount lines run on an absolute timeline — hires, leavers, and temporary contracts each have a real start and end month, so every month gets its own forecast. Pay rates are derived on the <a href="assumptions.html">Assumptions page</a>, not typed here.</p>

      <div class="planning-actions">
        <button class="add-cc-btn" id="addCostCenter" type="button">+ Add reporting line</button>
        <label class="smooth-toggle">
          <input type="checkbox" id="allocToggle">
          Fully-loaded view <span class="smooth-hint">(allocate shared/corporate cost centres to the others, by headcount)</span>
        </label>
      </div>

      <div id="ccBlocks"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lib.js"></script>
  <script src="data.js"></script>
  <script src="sidebar.js"></script>
  <script src="planning.js"></script>
  <script>requireAuthAndLoad(() => { renderSidebar(); window.initPage(); });</script>
</body>
</html>
