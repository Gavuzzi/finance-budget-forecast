<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning — FP&A</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="app-main">
      <header class="page-head">
        <div class="page-head-text">
          <h1 data-i18n="planning_h1">Planning</h1>
          <p class="page-sub" data-i18n="planning_subtitle">The headcount and cost drivers behind each reporting line</p>
        </div>
        <button class="help-toggle" type="button" data-i18n-title="help_toggle_title" title="Show explanations">?</button>
      </header>

      <div class="planning-actions">
        <button class="add-cc-btn" id="addCostCenter" type="button" data-i18n="add_reporting_line_btn">+ Add reporting line</button>
        <label class="smooth-toggle" id="allocToggleWrap" hidden data-i18n-title="fully_loaded_hint" title="Spreads each overhead line across the other lines, weighted by headcount. Display only — nothing is written.">
          <input type="checkbox" id="allocToggle">
          <span data-i18n="fully_loaded_toggle">Show with overhead allocated</span>
        </label>
      </div>

      <div id="ccBlocks"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lib.js"></script>
  <script src="i18n.js"></script>
  <script src="data.js"></script>
  <script src="sidebar.js"></script>
  <script src="planning.js"></script>
  <script>requireAuthAndLoad(() => { renderSidebar(); window.initPage(); });</script>
</body>
</html>
